server:
  port: 8083

spring:
  application:
    name: task-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/agility_tasks}
      database: agility_tasks

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
