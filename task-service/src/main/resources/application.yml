server:
  port: 8083
spring:
  application:
    name: task-service
  datasource:
    url: jdbc:h2:mem:taskdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
